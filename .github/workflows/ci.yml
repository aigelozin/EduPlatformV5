name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint + Type Check + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eduplatform
          POSTGRES_PASSWORD: eduplatform_test
          POSTGRES_DB: eduplatform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://eduplatform:eduplatform_test@localhost:5432/eduplatform_test
      TEST_DATABASE_URL: postgresql://eduplatform:eduplatform_test@localhost:5432/eduplatform_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-test-secret-minimum-32-characters-long
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PLATFORM_FEE_PERCENT: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Integration tests
        run: npm run test:integration
