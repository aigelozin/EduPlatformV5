// ── Ocean Background ─────────────────────────────────────
const OceanBG = () => {
  const { theme } = React.useContext(ThemeCtx);
  const dark = theme === 'dark';
  const windStreams = [
    { top: '12%', width: 320, left: '5%', delay: 0, dur: 8 },
    { top: '19%', width: 180, left: '30%', delay: 2.5, dur: 11 },
    { top: '28%', width: 420, left: '55%', delay: 1, dur: 9 },
    { top: '38%', width: 250, left: '15%', delay: 4, dur: 13 },
    { top: '47%', width: 140, left: '70%', delay: 0.5, dur: 7 },
    { top: '55%', width: 360, left: '40%', delay: 3, dur: 10 },
    { top: '64%', width: 200, left: '8%', delay: 6, dur: 14 },
    { top: '72%', width: 480, left: '60%', delay: 1.8, dur: 9.5 },
    { top: '80%', width: 160, left: '25%', delay: 5, dur: 12 },
    { top: '88%', width: 300, left: '50%', delay: 2, dur: 8.5 },
  ];

  const wavePath = (amp, phase, steps = 20) => {
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      const x = (i / steps) * 100;
      const y = 50 + amp * Math.sin((i / steps) * Math.PI * 4 + phase);
      pts.push(`${i === 0 ? 'M' : 'L'}${x},${y}`);
    }
    return pts.join(' ') + ` L100,100 L0,100 Z`;
  };

  return (
    <div id="ocean-bg">
      {/* Deep gradient */}
      <div style={{
        position: 'absolute', inset: 0,
        background: dark
          ? 'radial-gradient(ellipse 120% 80% at 50% 110%, #0a1c48 0%, #05091a 60%)'
          : 'radial-gradient(ellipse 120% 80% at 50% 110%, #6db8f0 0%, #ddf0fc 60%)',
        transition: 'background 0.5s ease',
      }}/>
      {/* Glow at horizon */}
      <div style={{
        position: 'absolute', bottom: '30%', left: '50%', transform: 'translateX(-50%)',
        width: '70%', height: 200,
        background: dark
          ? 'radial-gradient(ellipse at center, oklch(0.63 0.26 272 / 0.08) 0%, transparent 70%)'
          : 'radial-gradient(ellipse at center, rgba(100,180,255,0.18) 0%, transparent 70%)',
        pointerEvents: 'none',
      }}/>
      {/* Wave layers */}
      {(dark ? [
        { cls: 'wl1', fill: '#1e3a7a', amp: 14, phase: 0 },
        { cls: 'wl2', fill: '#162d62', amp: 18, phase: 1.2 },
        { cls: 'wl3', fill: '#0f2050', amp: 22, phase: 2.4 },
        { cls: 'wl4', fill: '#0a163a', amp: 28, phase: 0.8 },
        { cls: 'wl5', fill: '#081228', amp: 35, phase: 1.8 },
      ] : [
        { cls: 'wl1', fill: '#5aaae8', amp: 14, phase: 0 },
        { cls: 'wl2', fill: '#72b8f0', amp: 18, phase: 1.2 },
        { cls: 'wl3', fill: '#8cc8f8', amp: 22, phase: 2.4 },
        { cls: 'wl4', fill: '#a8d8fc', amp: 28, phase: 0.8 },
        { cls: 'wl5', fill: '#c0e4ff', amp: 35, phase: 1.8 },
      ]).map(w => (
        <div key={w.cls} className={`wave-layer ${w.cls}`}>
          <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d={wavePath(w.amp, w.phase)} fill={w.fill}/>
          </svg>
        </div>
      ))}
      {/* Wind streams */}
      {windStreams.map((s, i) => (
        <div key={i} className="wind-stream" style={{
          top: s.top, width: s.width, left: s.left,
          animation: `windFlow ${s.dur}s ${s.delay}s ease-in-out infinite`,
          opacity: 0,
        }}/>
      ))}
    </div>
  );
};

          <path d="M0,14 C80,4 160,24 240,14 C320,4 400,24 480,14 C560,4 640,24 720,14 C760,9 790,19 800,14"

// ── Lesson Screen ────────────────────────────────────────
const LessonScreen = ({ course, chapter, onBack, onCourseBack }) => {
  const videoRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);
  const [showCtrl, setShowCtrl] = useState(true);
  const [activeChapter, setActiveChapter] = useState(chapter);
  const timer = useRef(null);
  const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const pct = duration > 0 ? (currentTime / duration) * 100 : 0;

  const togglePlay = () => {
    const v = videoRef.current; if (!v) return;
    if (playing) { v.pause(); } else { v.play(); }
  };

  const nudgeControls = () => {
    setShowCtrl(true);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setShowCtrl(false), 3000);
  };

  useEffect(() => () => clearTimeout(timer.current), []);

  return (
    <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative', zIndex: 1 }}>
      {/* Video */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Breadcrumb */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8, padding: '10px 20px',
          borderBottom: '1px solid rgba(80,120,220,0.1)', fontSize: 11, color: 'var(--text-muted)', flexShrink: 0,
          background: 'rgba(5,9,26,0.6)', backdropFilter: 'blur(8px)',
        }}>
          <span onClick={onBack} style={{ cursor: 'pointer' }}>Каталог</span>
          <span style={{ color: 'var(--text-dim)' }}>∿</span>
          <span onClick={onCourseBack} style={{ cursor: 'pointer', color: course.waveAccent }}>{course.title}</span>
          <span style={{ color: 'var(--text-dim)' }}>∿</span>
          <span style={{ color: '#d8e8ff' }}>{activeChapter.title}</span>
        </div>

        {/* Video */}
        <div style={{ flex: 1, background: '#000', position: 'relative', cursor: 'pointer' }}
          onMouseMove={nudgeControls} onClick={togglePlay}>
          <video ref={videoRef} src="uploads/02177541912450300000000000000000000ffffac15a1a613d058.mp4"
            style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block' }}
            onTimeUpdate={e => setCurrentTime(e.target.currentTime)}
            onLoadedMetadata={e => setDuration(e.target.duration)}
            onPlay={() => setPlaying(true)} onPause={() => setPlaying(false)} onEnded={() => setPlaying(false)}
          />
          {/* Controls overlay */}
          <div style={{
            position: 'absolute', inset: 0,
            background: 'linear-gradient(to top, rgba(0,5,20,0.85) 0%, transparent 45%)',
            opacity: showCtrl || !playing ? 1 : 0, transition: 'opacity 0.4s',
            display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', padding: '0 20px 18px',
            pointerEvents: showCtrl || !playing ? 'auto' : 'none',
          }}>
            {/* Wave progress */}
            <div style={{ marginBottom: 12 }}>
              <svg viewBox={`0 0 800 12`} preserveAspectRatio="none" style={{ width: '100%', height: 12, cursor: 'pointer', display: 'block' }}
                onClick={e => {
                  e.stopPropagation();
                  const r = e.currentTarget.getBoundingClientRect();
                  if (videoRef.current) videoRef.current.currentTime = ((e.clientX - r.left) / r.width) * duration;
                }}
              >
                {/* Track wave */}
                <path d="M0,6 C40,2 80,10 120,6 C160,2 200,10 240,6 C280,2 320,10 360,6 C400,2 440,10 480,6 C520,2 560,10 600,6 C640,2 680,10 720,6 C760,2 800,8 800,6"
                  fill="none" stroke="rgba(100,150,255,0.2)" strokeWidth="2"/>
                {/* Progress wave — clip by pct */}
                <clipPath id="prog-clip">
                  <rect x="0" y="0" width={`${pct}%`} height="12"/>
                </clipPath>
                <path d="M0,6 C40,2 80,10 120,6 C160,2 200,10 240,6 C280,2 320,10 360,6 C400,2 440,10 480,6 C520,2 560,10 600,6 C640,2 680,10 720,6 C760,2 800,8 800,6"
                  fill="none" stroke={course.waveAccent} strokeWidth="2.5" clipPath="url(#prog-clip)"
                  style={{ filter: `drop-shadow(0 0 3px ${course.waveAccent})` }}/>
                {/* Foam dot at current pos */}
                <circle cx={`${pct}%`} cy="6" r="4" fill={course.waveAccent}
                  style={{ filter: `drop-shadow(0 0 4px ${course.waveAccent})` }}/>
              </svg>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }} onClick={e => e.stopPropagation()}>
              <button onClick={togglePlay} style={{
                background: `${course.waveAccent}22`, border: `1px solid ${course.waveAccent}44`,
                borderRadius: '50%', width: 38, height: 38, display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: '#fff', cursor: 'pointer', backdropFilter: 'blur(8px)',
              }}><Icon name={playing ? 'pause' : 'play'} size={15}/></button>
              <span style={{ fontSize: 12, color: 'rgba(180,210,255,0.8)', fontVariantNumeric: 'tabular-nums' }}>
                {fmt(currentTime)} / {fmt(duration)}
              </span>
              <div style={{ marginLeft: 'auto', display: 'flex', gap: 10, alignItems: 'center' }}>
                <Icon name="volume" size={13} style={{ color: 'rgba(180,210,255,0.5)' }}/>
                <input type="range" min={0} max={1} step={0.05} defaultValue={0.8}
                  onChange={e => { if(videoRef.current) videoRef.current.volume = +e.target.value; }}
                  style={{ width: 70, accentColor: course.waveAccent }}/>
                <Icon name="maximize" size={13} style={{ color: 'rgba(180,210,255,0.5)', cursor: 'pointer' }}/>
              </div>
            </div>
          </div>
        </div>

        {/* Meta */}
        <div style={{
          padding: '14px 20px', borderTop: '1px solid rgba(80,120,220,0.1)', flexShrink: 0,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          background: 'rgba(5,9,26,0.7)', backdropFilter: 'blur(10px)',
        }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: '#d8e8ff', letterSpacing: '-0.01em' }}>{activeChapter.title}</div>
            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 3 }}>{course.title} · {course.instructor}</div>
          </div>
          <button style={{
            background: `${course.waveAccent}14`, border: `1px solid ${course.waveAccent}33`,
            borderRadius: 8, color: course.waveAccent, fontSize: 12, padding: '7px 14px',
            cursor: 'pointer', fontFamily: 'var(--font)', fontWeight: 500,
          }}>Завершить урок ✓</button>
        </div>
      </div>

      {/* Sidebar */}
      <div style={{
        width: 280, borderLeft: '1px solid rgba(80,120,220,0.1)',
        display: 'flex', flexDirection: 'column', overflow: 'hidden',
        background: 'rgba(5,9,26,0.8)', backdropFilter: 'blur(12px)',
      }}>
        <div style={{ padding: '14px 16px', borderBottom: '1px solid rgba(80,120,220,0.1)' }}>
          <div style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em', color: 'var(--text-muted)' }}>Программа курса</div>
        </div>
        <div style={{ flex: 1, overflow: 'auto', padding: 10 }}>
          {course.chapters.map((ch, i) => (
            <div key={ch.id} onClick={() => setActiveChapter(ch)} style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px',
              borderRadius: 8, cursor: 'pointer', marginBottom: 4,
              background: ch.id === activeChapter.id ? `${course.waveAccent}14` : 'transparent',
              border: `1px solid ${ch.id === activeChapter.id ? course.waveAccent+'25' : 'transparent'}`,
              transition: 'all 0.15s',
            }}
            onMouseEnter={e => ch.id !== activeChapter.id && (e.currentTarget.style.background = 'rgba(15,28,65,0.8)')}
            onMouseLeave={e => ch.id !== activeChapter.id && (e.currentTarget.style.background = 'transparent')}
            >
              <div style={{
                width: 22, height: 22, borderRadius: '50%', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: ch.done ? 'rgba(200,160,80,0.1)' : 'rgba(80,120,220,0.08)',
                fontSize: 9, color: ch.done ? 'var(--gold)' : 'var(--text-dim)',
              }}>{ch.done ? <Icon name="check" size={9}/> : i + 1}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 11, color: ch.id === activeChapter.id ? '#d8e8ff' : 'var(--text-muted)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: ch.id === activeChapter.id ? 600 : 400 }}>{ch.title}</div>
                <div style={{ fontSize: 9, color: 'var(--text-dim)', marginTop: 1 }}>{ch.duration}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

const TweaksPanel = ({ visible, onClose }) => {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const apply = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    if (key === 'accentColor') document.documentElement.style.setProperty('--accent', val);
    if (key === 'depthColor') document.documentElement.style.setProperty('--bg', val);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };
  if (!visible) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, width: 220, zIndex: 9999,
      background: 'rgba(8,15,38,0.95)', border: '1px solid rgba(80,120,220,0.18)', borderRadius: 14,
      padding: 16, backdropFilter: 'blur(20px)', boxShadow: '0 12px 48px rgba(0,0,30,0.7)',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>Tweaks</div>
        <div onClick={onClose} style={{ cursor: 'pointer', color: 'var(--text-muted)' }}>✕</div>
      </div>
      <div style={{ fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--text-muted)', marginBottom: 8 }}>Цвет свечения</div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
        {[
          { c: 'oklch(0.63 0.26 272)', rgb: '#6366f1' },
          { c: 'oklch(0.60 0.22 240)', rgb: '#3b82f6' },
          { c: 'oklch(0.65 0.20 160)', rgb: '#10b981' },
          { c: 'oklch(0.65 0.24 330)', rgb: '#ec4899' },
        ].map(a => (
          <div key={a.rgb} onClick={() => apply('accentColor', a.c)} style={{
            width: 26, height: 26, borderRadius: '50%', background: a.rgb, cursor: 'pointer',
            border: tweaks.accentColor === a.c ? '2px solid white' : '2px solid transparent',
            transition: 'border 0.15s',
          }}/>
        ))}
      </div>
      <div style={{ fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--text-muted)', marginBottom: 8 }}>Глубина океана</div>
      {[
        { l: 'Глубокий океан', v: '#05091a' },
        { l: 'Ночное море', v: '#030810' },
        { l: 'Сумеречная лагуна', v: '#08101a' },
      ].map(d => (
        <div key={d.l} onClick={() => apply('depthColor', d.v)} style={{
          padding: '6px 10px', borderRadius: 6, marginBottom: 4, cursor: 'pointer', fontSize: 11,
          background: tweaks.depthColor === d.v ? 'rgba(100,150,255,0.1)' : 'transparent',
          color: tweaks.depthColor === d.v ? '#a0c0ff' : 'var(--text-muted)',
          border: `1px solid ${tweaks.depthColor === d.v ? 'rgba(100,150,255,0.2)' : 'transparent'}`,
        }}>{d.l}</div>
      ))}
    </div>
  );
};

// ── App ──────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = useState(() => localStorage.getItem('scholar_screen') || 'home');
  const [course, setCourse] = useState(null);
  const [chapter, setChapter] = useState(null);
  const [tweaks, setTweaks] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [theme, setTheme] = useState(() => localStorage.getItem('scholar_theme') || 'dark');

  const toggleTheme = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
    localStorage.setItem('scholar_theme', next);
    document.documentElement.setAttribute('data-theme', next);
  };

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => { localStorage.setItem('scholar_screen', screen); }, [screen]);
  useEffect(() => {
    const h = ({ data }) => {
      if (data?.type === '__activate_edit_mode') setTweaks(true);
      if (data?.type === '__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  return (
    <ThemeCtx.Provider value={{ theme, toggleTheme }}>
    <MenuCtx.Provider value={{ menuOpen, setMenuOpen }}>
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <OceanBG/>
      <Drawer onCourseClick={c => { setCourse(c); setScreen('course'); }}/>
      <WaveHeader screen={screen} setScreen={s => { setScreen(s); if (s === 'home') setCourse(null); }}/>
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column', position: 'relative', zIndex: 1 }}>
        {screen === 'home' && <HomeScreen onCourseClick={c => { setCourse(c); setScreen('course'); }}/>}
        {screen === 'course' && course && (
          <CourseScreen course={course} onBack={() => setScreen('home')}
            onLesson={(c, ch) => { setCourse(c); setChapter(ch); setScreen('lesson'); }}/>
        )}
        {screen === 'lesson' && course && chapter && (
          <LessonScreen course={course} chapter={chapter}
            onBack={() => setScreen('home')} onCourseBack={() => setScreen('course')}/>
        )}
      </div>
      <TweaksPanel visible={tweaks} onClose={() => setTweaks(false)}/>
    </div>
    </MenuCtx.Provider>
    </ThemeCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
